<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UNIBRIDGE 煲匯橋 - 粵語學習空間</title>
    <style>
        :root {
            /* 💙 萊茵藍核心色 Rhine Blue */
            --rhine-blue: #0047AB; 
            
            /* ✨ 修改：網頁背景改為淺藍色純色 */
            --bg-color: #E3F2FD; 
            
            --text-color: #1d1d1f;
            --card-bg: rgba(255, 255, 255, 0.8); /* 毛玻璃卡片基底 */
            --nav-bg: rgba(245, 245, 247, 0.85);
            --primary-blue: var(--rhine-blue);
            --logo-blue: var(--rhine-blue);
            --border-color: rgba(0, 0, 0, 0.1);
            --accent-gold: #ff9f0a;
            --success-green: #34c759;
            --danger-red: #ff3b30;
            --glass-blur: blur(20px);
        }
        [data-theme="dark"] {
            --bg-color: #001122; /* 深淺藍背景 */
            --text-color: #f5f5f7;
            --card-bg: rgba(28, 28, 30, 0.8); 
            --nav-bg: rgba(28, 28, 30, 0.9);
            --primary-blue: #2997ff;
            --logo-blue: #4da3ff;
            --border-color: rgba(255, 255, 255, 0.15);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0; padding: 0; transition: all 0.5s cubic-bezier(0.28, 0.11, 0.32, 1);
            -webkit-font-smoothing: antialiased; 
            /* ✨ 修改：純色背景，無圖案 */
            background-color: var(--bg-color); 
            min-height: 100vh;
        }

        /* 頂部 Header：蘋果毛玻璃 */
        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 14px 6%; border-bottom: 1px solid var(--border-color);
            background-color: var(--card-bg); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
            position: sticky; top: 0; z-index: 1000;
        }

        .brand-container { display: flex; align-items: center; gap: 10px; }
        /* 保留 IP 形象 */
        .ip-char { width: 45px; height: 45px; }
        .logo-en { font-size: 24px; font-weight: 800; color: var(--logo-blue); font-style: italic; margin: 0; }
        .logo-cn { font-size: 14px; font-weight: 700; color: var(--logo-blue); letter-spacing: 2px; }

        .controls button, .btn {
            padding: 6px 14px; cursor: pointer; border: 1.5px solid var(--primary-blue);
            background: transparent; color: var(--primary-blue); border-radius: 20px;
            font-weight: 600; font-size: 13px; transition: 0.2s;
        }
        .controls button:hover, .btn:hover { background: var(--primary-blue); color: white; }
        .controls button.active-lang { background: var(--primary-blue); color: white; }

        /* ✨ 修改：經驗值欄換上主題萊茵藍 */
        .status-bar {
            background-color: var(--rhine-blue); /* 主題色萊茵藍 */
            color: white; /* 文字改為白色 */
            padding: 10px 6%;
            display: flex; justify-content: space-between; align-items: center;
            font-size: 13px; font-weight: 600; border-bottom: 1px solid rgba(255,255,255,0.2);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        }
        [data-theme="dark"] .status-bar { background-color: rgba(0, 71, 171, 0.5); }
        
        .xp-bar-bg { background: rgba(255,255,255,0.2); border-radius: 10px; width: 100px; height: 6px; overflow: hidden; }
        /* 經驗值填滿條也用主題藍 */
        .xp-bar-fill { background: white; height: 100%; width: 0%; transition: 0.4s; }

        /* ✨ 修改：導航欄換上主題萊茵藍 */
        nav {
            display: flex; justify-content: center; 
            background-color: rgba(0, 71, 171, 0.9); /* 萊茵藍 + 透明度 */
            backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
            border-bottom: 1px solid rgba(255,255,255,0.1); overflow-x: auto; scrollbar-width: none;
            position: sticky; top: 73px; z-index: 999;
        }
        nav::-webkit-scrollbar { display: none; }
        
        nav button {
            background: none; border: none; padding: 15px 20px; font-size: 14px;
            color: white; cursor: pointer; font-weight: 600; white-space: nowrap; opacity: 0.7;
            transition: 0.2s;
        }
        /* 導航按鈕激活狀態：加強顯示 */
        nav button.active-nav { 
            opacity: 1; color: white; 
            border-bottom: 3px solid white; /* 白色下劃線 */
            background-color: rgba(255,255,255,0.1);
        }

        /* 保留卡片切換動畫 */
        .content-section { display: none; padding: 25px 5%; max-width: 800px; margin: 0 auto; animation: slideUp 0.4s ease-out; }
        .content-section.active { display: block; }
        @keyframes slideUp { from { opacity:0; transform: translateY(10px); } to { opacity:1; transform: translateY(0); } }

        .section-desc {
            background: rgba(0, 71, 171, 0.05); border-left: 4px solid var(--primary-blue);
            padding: 12px 16px; border-radius: 8px; font-size: 13px; margin-bottom: 20px;
            color: var(--text-color);
        }

        /* 蘋果風毛玻璃卡片 */
        .card {
            background: var(--card-bg); backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur); padding: 20px; border-radius: 18px;
            border: 1px solid var(--border-color); margin-bottom: 20px; box-shadow: 0 8px 32px rgba(0,0,0,0.03);
        }

        .welcome-hero { text-align: center; padding: 30px 0; }
        .welcome-hero h1 { font-size: 32px; font-weight: 800; color: var(--primary-blue); margin-bottom: 15px; }
        .soup-box { font-style: italic; opacity: 0.8; padding: 15px; border-radius: 12px; border: 1px dashed var(--border-color); display: inline-block; color: var(--text-color); }

        /* 對話框：iMessage 風格 (保留) */
        .chat-container { display: flex; flex-direction: column; gap: 12px; }
        .chat-row { display: flex; flex-direction: column; width: 100%; }
        .chat-row.waiter-align { align-items: flex-start; }
        .chat-row.user-align { align-items: flex-end; }
        .chat-meta { font-size: 11px; font-weight: 600; opacity: 0.5; margin-bottom: 4px; padding: 0 6px; color: var(--text-color); }
        
        .chat-bubble {
            max-width: 82%; padding: 12px 16px; border-radius: 20px; line-height: 1.5; font-size: 15px;
        }
        .chat-waiter { background: #e9e9eb; color: black; align-self: flex-start; border-top-left-radius: 4px; }
        .chat-user { background: var(--primary-blue); color: white; align-self: flex-end; border-top-right-radius: 4px; }
        [data-theme="dark"] .chat-waiter { background: #3a3a3c; color: white; }

        .chat-sub-text { display: block; font-size: 12px; margin-top: 4px; opacity: 0.7; }
        .chat-actions { display: flex; gap: 6px; margin-top: 8px; border-top: 1px solid rgba(0,0,0,0.05); padding-top: 6px; }
        .chat-user .chat-actions { border-top-color: rgba(255,255,255,0.1); }
        .chat-btn { background: rgba(0,0,0,0.04); border: none; color: inherit; padding: 4px 10px; border-radius: 10px; font-size: 11px; font-weight: 600; cursor: pointer; }
        .chat-user .chat-btn { background: rgba(255,255,255,0.1); }

        .score-box {
            margin-top: 8px; padding: 10px; background: rgba(52, 199, 89, 0.1);
            border-radius: 12px; font-size: 12px; display: none; color: var(--text-color);
        }

        .culture-content { max-height: 45px; overflow: hidden; transition: 0.3s; font-size: 14px; color: var(--text-color); }
        .culture-content.expanded { max-height: 1000px; }
        .toggle-story-btn { background: none; border: none; color: var(--primary-blue); font-weight: 600; cursor: pointer; margin-top: 10px; font-size: 12px; }

        input[type="text"] {
            width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--border-color);
            background: rgba(255,255,255,0.5); color: var(--text-color); margin-bottom: 10px;
        }

        @media (max-width: 600px) {
            header { flex-direction: column; gap: 10px; }
            nav { top: 103px; }
            nav button { padding: 12px 10px; font-size: 13px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="brand-container">
            <div class="ip-char">
                <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <path d="M20,35 Q50,15 80,35 Z" fill="#f5f7fa" stroke="#0047AB" stroke-width="3"/>
                    <circle cx="50" cy="22" r="6" fill="#f5f7fa" stroke="#0047AB" stroke-width="3"/>
                    <path d="M15,35 Q50,45 85,35 L80,75 Q50,85 20,75 Z" fill="#0047AB" stroke="#0047AB" stroke-width="2"/>
                    <path d="M5,40 H15 M85,40 H95" stroke="#0047AB" stroke-width="5" stroke-linecap="round"/>
                    <path d="M40,10 Q50,0 60,10 M45,5 Q50,0 55,5" stroke="#ffb703" stroke-width="3" stroke-linecap="round" fill="none"/>
                    <circle cx="38" cy="55" r="3" fill="white"/>
                    <circle cx="62" cy="55" r="3" fill="white"/>
                    <path d="M42,68 Q50,75 58,68" stroke="white" stroke-width="3" fill="none" stroke-linecap="round"/>
                </svg>
            </div>
            <div class="logo-text-group">
                <div class="logo-en">UNIBRIDGE</div>
                <div class="logo-cn">煲匯橋</div>
            </div>
        </div>
        <div class="controls">
            <button id="lang-zh-HK" class="active-lang" onclick="changeLang('zh-HK')">繁</button>
            <button id="lang-zh-CN" onclick="changeLang('zh-CN')">简</button>
            <button id="lang-en" onclick="changeLang('en')">EN</button>
            <button onclick="toggleTheme()">🌓</button>
        </div>
    </header>

    <div class="status-bar">
        <div><span data-i18n="level">等級</span>: <span id="user-level">1</span> <span id="level-title">(👶 新手村)</span></div>
        <div><span data-i18n="xp">經驗值</span>: <span id="user-xp">0</span> / 100 XP <div class="xp-bar-bg"><div id="xp-fill" class="xp-bar-fill"></div></div></div>
    </div>

    <nav>
        <button id="nav-home" class="active-nav" onclick="showSection('home')" data-i18n="nav-home">首頁</button>
        <button id="nav-vocab" onclick="showSection('vocab')" data-i18n="nav-vocab">生存高頻詞彙</button>
        <button id="nav-dialogue" onclick="showSection('dialogue')" data-i18n="nav-dialogue">擬真對話實戰</button>
        <button id="nav-quiz" onclick="showSection('quiz')" data-i18n="nav-quiz">智能測驗題庫</button>
        <button id="nav-culture" onclick="showSection('culture')" data-i18n="nav-culture">香港文化典故</button>
    </nav>

    <main id="home" class="content-section active">
        <div class="welcome-hero">
            <h1 data-i18n="welcome-title">今日想港滴乜嘢？</h1>
            <div class="soup-box" id="daily-soup">正在為你煲今日廣東話心靈雞湯...</div>
        </div>
        <div class="card" style="text-align: center;">
            <p style="font-weight: bold;" data-i18n="tip-title">💡 快捷提示</p>
            <p data-i18n="tip-desc">請點擊上方導航欄切換板塊開始修行！</p>
        </div>
    </main>

    <main id="vocab" class="content-section">
        <div class="section-desc" data-i18n="desc-vocab">🌱 快速學會打招呼、數字與茶餐廳單詞。</div>
        <div class="card">
            <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
                <h2 style="margin:0;" data-i18n="title-vocab">📊 高頻詞彙</h2>
                <button class="btn" onclick="refreshVocab()" data-i18n="btn-refresh">🔄 換一批</button>
            </div>
            <table style="width:100%;">
                <tbody id="vocab-table-body"></tbody>
            </table>
        </div>
    </main>

    <main id="dialogue" class="content-section">
        <div class="section-desc" data-i18n="desc-dialogue">⚔️ 實境對話挑戰，支持 AI 語音精準打分！</div>
        <div class="card">
            <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
                <h2 style="margin:0;" data-i18n="title-dialogue">🗣️ 擬真對話 (10話輪完整劇本)</h2>
                <button class="btn" onclick="refreshDialogue()" data-i18n="btn-change-scene">🔄 切換場景</button>
            </div>
            <p id="current-scenario-name" style="font-weight:bold; color:var(--primary-blue); margin-bottom:20px;"></p>
            <div class="chat-container" id="dialogue-chat-container"></div>
        </div>
    </main>

    <main id="quiz" class="content-section">
        <div class="section-desc" data-i18n="desc-quiz">🏆 每日自動派發挑戰，支持自定義題庫。</div>
        <div id="system-quiz-container"></div>
        <div class="card">
            <h3 data-i18n="add-quiz">新增題目</h3>
            <input type="text" id="form-question" placeholder="題目內容">
            <input type="text" id="form-answer" placeholder="正確答案">
            <button class="btn" onclick="handleQuizSubmit()" data-i18n="btn-save">儲存題目</button>
        </div>
        <div class="card">
            <table style="width:100%; font-size:14px;">
                <tbody id="admin-quiz-tbody"></tbody>
            </table>
        </div>
    </main>

    <main id="culture" class="content-section">
        <div class="section-desc" data-i18n="desc-culture">🧳 探索老香港傳奇故事。</div>
        <div id="culture-card-container"></div>
    </main>

    <script>
        const i18nDict = {
            'zh-HK': { 'level':'等級', 'xp':'經驗值', 'nav-home':'首頁', 'nav-vocab':'生存高頻詞彙', 'nav-dialogue':'擬真對話實戰', 'nav-quiz':'智能測驗題庫', 'nav-culture':'香港文化典故', 'welcome-title':'今日想港滴乜嘢？', 'tip-title':'💡 快捷提示', 'tip-desc':'請點擊導航欄切換板塊開始修行！', 'desc-vocab':'🌱 快速學會打招呼、數字與茶餐廳單詞。', 'title-vocab':'📊 高頻詞彙', 'btn-refresh':'🔄 換一批', 'desc-dialogue':'⚔️ 實境對話挑戰，支持 AI 語音精準打分！', 'title-dialogue':'🗣️ 擬真對話', 'btn-change-scene':'🔄 切換場景', 'desc-quiz':'🏆 每日自動派發挑戰，支持自定義題庫。', 'add-quiz':'新增題目', 'btn-save':'儲存題目', 'desc-culture':'🧳 探索老香港傳奇故事。' },
            'zh-CN': { 'level':'等级', 'xp':'经验值', 'nav-home':'首页', 'nav-vocab':'生存高频词汇', 'nav-dialogue':'拟真对话实战', 'nav-quiz':'智能测验题库', 'nav-culture':'香港文化典故', 'welcome-title':'今日想港滴乜嘢？', 'tip-title':'💡 快捷提示', 'tip-desc':'请点击导航栏切换板块開始修行！', 'desc-vocab':'🌱 快速学会打招呼、数字与茶餐厅单词。', 'title-vocab':'📊 高频词汇', 'btn-refresh':'🔄 换一批', 'desc-dialogue':'⚔️ 实境对话挑战，支持 AI 语音精准打分！', 'title-dialogue':'🗣️ 拟真对话', 'btn-change-scene':'🔄 切换场景', 'desc-quiz':'🏆 每日自动派发挑战，支持自定义题库。', 'add-quiz':'新增题目', 'btn-save':'储存题目', 'desc-culture':'🧳 探索老香港传奇故事。' },
            'en': { 'level':'Level', 'xp':'XP', 'nav-home':'Home', 'nav-vocab':'Vocab', 'nav-dialogue':'Dialogue', 'nav-quiz':'Quiz', 'nav-culture':'Culture', 'welcome-title':'What to talk about HK?', 'tip-title':'💡 Quick Tip', 'tip-desc':'Click the nav bar to start learning!', 'desc-vocab':'🌱 Learn essential HK words and phrases.', 'title-vocab':'📊 Vocab List', 'btn-refresh':'🔄 Shuffle', 'desc-dialogue':'⚔️ Practice with AI voice recognition!', 'title-dialogue':'🗣️ Dialogue', 'btn-change-scene':'🔄 Switch Scenarios', 'desc-quiz':'🏆 Daily challenges and custom bank.', 'add-quiz':'Add New', 'btn-save':'Save', 'desc-culture':'🧳 Explore HK legends.' }
        };

        const soupPool = ["「做人如果無夢想，同條鹹魚有咩分別呀？」", "「最緊要個人開心，行行下就到黎明啦。」", "「食得鹹魚抵得渴，每日學多句粵語！」"];
        const bigVocabPool = [ {tc:'唔該', jp:'m4 goi1', en:'Please'}, {tc:'埋單', jp:'maai4 daan1', en:'Check'}, {tc:'凍檸茶', jp:'dung3 leng2 caa4', en:'Iced Lemon Tea'}, {tc:'邊度', jp:'bin1 dou6', en:'Where'} ];
        
        // 保留：10話輪對話
        const dialoguePool = [{ name: "旺角茶餐廳實戰 (10話輪完整劇本)", story: [ 
            {role:"waiter", text:"歡迎光臨！幾多位啊？入面邊度自便啦。", sub:"(Welcome! How many? Sit anywhere inside.)"}, 
            {role:"user", text:"兩位，唔該。想要個靠邊嘅卡位。", sub:"(Two, thanks. Want a booth by the side.)"}, 
            {role:"waiter", text:"卡位要同人搭枱喎，你哋介唔介意先？", sub:"(Booth needs table-sharing, do you mind?)"}, 
            {role:"user", text:"冇問題，搭枱都得。唔該比張餐牌我睇下。", sub:"(No problem, sharing is ok. Menu please.)"},
            {role:"waiter", text:"今日下晝茶，常餐同西多士最抵食，想飲咩嘢啊？", sub:"(Tea time today, set meal and French toast are best value. Drinks?)"},
            {role:"user", text:"我要一個常餐，配叉燒意粉，嘢飲要熱奶茶。", sub:"(A set meal with BBQ pork macaroni, hot milk tea.)"},
            {role:"waiter", text:"好，常餐叉意熱奶茶。你朋友呢？凍飲要加三蚊喎。", sub:"(OK, macaroni and hot milk tea. Your friend? Cold drink +$3.)"},
            {role:"user", text:"佢要茶走，唔該，嘢食要個菠蘿油。", sub: "(Tea-jau [condensed milk tea] please, and a pineapple bun with butter.)"},
            {role:"waiter", text:"收到！常餐叉意熱奶、菠蘿油茶走。嘢食起好即刻幫你送黎！", sub:"(Got it! Food will be served once ready.)"},
            {role:"user", text:"唔該晒，嘢食麻煩起快少少啊，我哋趕時間。", sub:"(Thanks, please hurry, we are in a rush.)"}
        ] }];
        
        const culturePool = [ { title: "☕ 茶餐廳密碼", preview: "「靚仔」指白飯，「敗家仔」係阿華田...", full: "香港茶餐廳有一套獨特速記代號。例如「靚仔」指白飯，「反Q」代表西多士。掌握呢啲密碼，你先係地道老香港！" } ];
        const autoQuizPool = [ {question: "「買單」粵語點講？", answer: "埋單"} ];

        let xp = parseInt(localStorage.getItem('ub_xp')) || 0;
        let level = parseInt(localStorage.getItem('ub_lvl')) || 1;
        let currentLang = localStorage.getItem('ub_lang') || 'zh-HK';
        let customQuizzes = JSON.parse(localStorage.getItem('ub_custom_quizzes')) || [];

        function changeLang(lang) {
            currentLang = lang; localStorage.setItem('ub_lang', lang);
            document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active-lang'));
            document.getElementById(`lang-${lang}`).classList.add('active-lang');
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (i18nDict[lang][key]) el.innerText = i18nDict[lang][key];
            });
        }

        function showSection(id) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-nav'));
            document.getElementById(id).classList.add('active');
            document.getElementById('nav-'+id).classList.add('active-nav');
            window.scrollTo(0,0);
        }

        function speak(text) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(text); u.lang = 'zh-HK'; u.rate = 0.95;
            window.speechSynthesis.speak(u);
        }

        function startScoring(target, id) {
            const box = document.getElementById('score-box-'+id);
            box.style.display = "block"; box.innerText = "🎙️ 正在聆聽...";
            const Recog = window.SpeechRecognition || window.webkitSpeechRecognition;
            if(!Recog) { 
                setTimeout(() => { box.innerText = `📊 模擬評分：92% (地道！)\n🎉 +15 XP`; gainXP(15); }, 1000);
                return;
            }
            const r = new Recog(); r.lang = 'zh-HK';
            r.onresult = (e) => {
                const res = e.results[0][0].transcript;
                const score = res.includes(target.substring(0,2)) ? 95 : 60;
                box.innerHTML = `✅ 識別到：<b>"${res}"</b><br>🎯 準確度：${score}%<br>🎉 +15 XP`;
                gainXP(15);
            };
            r.start();
        }

        function refreshVocab() {
            const pool = [...bigVocabPool].sort(() => 0.5 - Math.random()).slice(0, 4);
            const body = document.getElementById('vocab-table-body'); body.innerHTML = '';
            pool.forEach(v => {
                body.innerHTML += `<tr><td><b>${v.tc}</b></td><td><code>${v.jp}</code></td><td>${v.en}</td><td><button class="btn" onclick="speak('${v.tc}')">🔊</button></td></tr>`;
            });
        }

        function refreshDialogue() {
            const sc = dialoguePool[0]; document.getElementById('current-scenario-name').innerText = sc.name;
            const container = document.getElementById('dialogue-chat-container'); container.innerHTML = '';
            sc.story.forEach((l, i) => {
                const isWaiter = l.role === 'waiter';
                container.innerHTML += `
                    <div class="chat-row ${isWaiter?'waiter-align':'user-align'}">
                        <div class="chat-meta">${isWaiter?'Staff':'You'}</div>
                        <div class="chat-bubble ${isWaiter?'chat-waiter':'chat-user'}">
                            <b>${l.text}</b><br><small class="chat-sub-text">${l.sub}</small>
                            <div class="chat-actions">
                                <button class="chat-btn" onclick="speak('${l.text}')">🔊</button>
                                ${!isWaiter?`<button class="chat-btn" onclick="startScoring('${l.text}',${i})" style="color:var(--accent-gold);">🎤 跟讀</button>`:''}
                            </div>
                        </div>
                        <div id="score-box-${i}" class="score-box"></div>
                    </div>`;
            });
        }

        function refreshCulture() {
            const container = document.getElementById('culture-card-container'); container.innerHTML = '';
            culturePool.forEach((c, i) => {
                container.innerHTML += `<div class="card"><h3>${c.title}</h3><div id="c-text-${i}" class="culture-content"><i>${c.preview}</i><br><br>${c.full}</div><button class="toggle-story-btn" onclick="document.getElementById('c-text-${i}').classList.toggle('expanded'); this.innerText=this.innerText==='展開全文 ➔'?'收起故事 ↩':'展開全文 ➔'">展開全文 ➔</button></div>`;
            });
        }

        function gainXP(amt) {
            xp += amt; if(xp >= 100) { xp-=100; level++; alert(`🎉 升級！Level ${level}`); }
            localStorage.setItem('ub_xp', xp); localStorage.setItem('ub_lvl', level); updateStatus();
        }

        function updateStatus() {
            document.getElementById('user-xp').innerText = xp; document.getElementById('user-level').innerText = level;
            document.getElementById('xp-fill').style.width = xp + '%';
        }

        function handleQuizSubmit() {
            const q = document.getElementById('form-question').value; const a = document.getElementById('form-answer').value;
            if(!q || !a) return; customQuizzes.push({question:q, answer:a});
            localStorage.setItem('ub_custom_quizzes', JSON.stringify(customQuizzes)); renderQuizzes();
        }

        function renderQuizzes() {
            const sys = document.getElementById('system-quiz-container'); sys.innerHTML = '';
            autoQuizPool.forEach((q, i) => {
                sys.innerHTML += `<div class="card"><b>今日挑戰：${q.question}</b><br><input type="text" id="sys-ans-${i}" style="width:60%; margin-top:10px;"><button class="btn" onclick="if(document.getElementById('sys-ans-${i}').value==='${q.answer}'){alert('✅ 正確！+30 XP');gainXP(30)}else{alert('❌ 唔啱喔')}">提交</button></div>`;
            });
            const tbody = document.getElementById('admin-quiz-tbody'); tbody.innerHTML = '';
            customQuizzes.forEach((q, i) => {
                tbody.innerHTML += `<tr><td>${q.question}</td><td><mark>${q.answer}</mark></td><td><button onclick="customQuizzes.splice(${i},1);localStorage.setItem('ub_custom_quizzes', JSON.stringify(customQuizzes));renderQuizzes()" style="border:none; color:red; background:none; cursor:pointer;">刪</button></td></tr>`;
            });
        }

        function toggleTheme() { document.body.getAttribute('data-theme') === 'dark' ? document.body.removeAttribute('data-theme') : document.body.setAttribute('data-theme', 'dark'); }

        // 啟動
        updateStatus(); changeLang(currentLang); document.getElementById('daily-soup').innerText = soupPool[new Date().getDate()%3];
        refreshVocab(); refreshDialogue(); refreshCulture(); renderQuizzes();
    </script>
</body>
</html>
